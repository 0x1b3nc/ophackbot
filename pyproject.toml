[project]
name = "hackbot-kit"
version = "0.1.0"
description = "Authorized bug bounty and lab automation kit"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "rich>=13.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[project.scripts]
hackbot = "hackbot.cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["hackbot*"]

[tool.setuptools.package-data]
hackbot = ["py.typed"]
